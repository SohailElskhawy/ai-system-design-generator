# Netlify Configuration for Next.js App Router
# Reference: https://docs.netlify.com/integrations/next-js-integration/

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Lock Node.js version for builds to ensure compatibility with React 19/Next 16
  NODE_VERSION = "20"

# Optional: Configuration for Netlify Functions (Serverless endpoints)
[functions]
  node_bundler = "esbuild"
